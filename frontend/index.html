<!doctype html>
<html lang="ru">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("vpn-admin-theme");
          document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
          document.documentElement.style.colorScheme = t === "light" ? "light" : "dark";
          document.documentElement.classList.remove("admin-theme-animating");
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Панель управления</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
